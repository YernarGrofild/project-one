name: 🚀 Build & Deploy React to VPS

on:
  push:
    branches: [main]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Подготовка Docker buildx
      - uses: docker/setup-buildx-action@v3

      # Логинимся в ghcr.io через PAT
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ secrets.REGISTRY_USER }}
          password: ${{ secrets.GHCR_TOKEN }}

      # Собираем образ из директории frontend и пушим
      - uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: ghcr.io/${{ secrets.REGISTRY_USER }}/projectone-frontend:latest

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      # Подключаемся к VPS и разворачиваем контейнер
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            # логин в GHCR через PAT
            echo ${{ secrets.GHCR_TOKEN }} | docker login ghcr.io -u ${{ secrets.REGISTRY_USER }} --password-stdin
            # тянем образ и рестартуем контейнер
            docker pull ghcr.io/${{ secrets.REGISTRY_USER }}/projectone-frontend:latest
            docker stop projectone-frontend || true
            docker rm projectone-frontend || true
            docker run -d --name projectone-frontend -p 80:80 ghcr.io/${{ secrets.REGISTRY_USER }}/projectone-frontend:latest
