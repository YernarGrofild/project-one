name: 🚀 Build & Deploy React to VPS

on:
  push:
    branches: [ main ]   # поменяй если у тебя master

jobs:
  deploy:
    runs-on: ubuntu-latest

    env:
      APP_DIR: frontend
      DIST_DIR: build     # у CRA = build; если Vite — dist

    steps:
      - name: 🧩 Checkout
        uses: actions/checkout@v4

      - name: 🟢 Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: 📦 Install deps
        working-directory: ${{ env.APP_DIR }}
        run: npm ci

      - name: 🏗️ Build
        working-directory: ${{ env.APP_DIR }}
        run: npm run build

      - name: 🔐 Setup SSH config
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          printf "Host vps\n  HostName %s\n  User %s\n  IdentityFile ~/.ssh/id_ed25519\n  StrictHostKeyChecking no\n" \
            "${{ secrets.SSH_HOST }}" "${{ secrets.SSH_USER }}" > ~/.ssh/config

      # <<< Диагностика SSH/rsync
      - name: 🔐 Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          printf "Host vps\n  HostName %s\n  User %s\n  IdentityFile ~/.ssh/id_ed25519\n  StrictHostKeyChecking no\n" \
            "${{ secrets.SSH_HOST }}" "${{ secrets.SSH_USER }}" > ~/.ssh/config

      - name: 🔎 Debug SSH
        run: ssh -vvv vps 'echo "SSH OK on $(hostname)" && which rsync || echo "rsync missing"'

      - name: 🗂️ Ensure target dir
        run: ssh vps 'mkdir -p /var/www/mysite && chmod -R 755 /var/www/mysite'

      - name: 🚀 Upload build to VPS
        run: rsync -avz --delete ${{ env.APP_DIR }}/${{ env.DIST_DIR }}/ vps:/var/www/mysite/