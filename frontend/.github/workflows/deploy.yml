name: 🚀 Build & Deploy React to VPS

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    env:
      APP_DIR: frontend
      DIST_DIR: build  # для Create React App, если используешь Vite — поставь dist

    steps:
      - name: 🧩 Checkout code
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: 📦 Install dependencies
        working-directory: ${{ env.APP_DIR }}
        run: npm ci

      - name: 🏗️ Build project
        working-directory: ${{ env.APP_DIR }}
        run: npm run build

      - name: 🔐 Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          echo -e "Host vps\n  HostName ${{ secrets.SSH_HOST }}\n  User ${{ secrets.SSH_USER }}\n  IdentityFile ~/.ssh/id_ed25519\n  StrictHostKeyChecking no" > ~/.ssh/config

      - name: 🗂️ Upload build to VPS
        run: |
          rsync -avz --delete ${{ env.APP_DIR }}/${{ env.DIST_DIR }}/ vps:/var/www/mysite/

      - name: 🔄 Reload Nginx
        run: ssh vps 'sudo nginx -t && sudo systemctl reload nginx'